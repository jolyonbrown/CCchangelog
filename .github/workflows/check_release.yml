name: Check Claude Code Release

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Restore cached version state
        uses: actions/cache/restore@v4
        with:
          path: last_version.txt
          key: last-posted-version-dummy
          restore-keys: |
            last-posted-version-

      - name: Build
        run: zig build -Doptimize=ReleaseSafe

      - name: Run bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: ./zig-out/bin/ccchangelog

      - name: Save version state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_version.txt
          key: last-posted-version-${{ github.run_id }}
